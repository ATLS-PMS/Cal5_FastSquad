<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Macelleria PMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>La MAcelleria PMS</h1>
    <div id="nav-tabs">
        <button onclick="showSection('main-section')">Campo</button>
        <button onclick="showSection('admin-section')">Giocatori</button>
        <button onclick="showSection('history-section')">Storico</button>
    </div>
</header>

<div class="container">
    <div id="sync-info">
        <span id="cloud-status">Inizializzazione...</span><br>
        <span id="last-sync-time">---</span>
    </div>

    <section id="main-section">
        <div class="card">
            <h2>Convocati (<span id="selected-count">0</span>/10)</h2>
            <ul id="selection-player-list"></ul>
            <button class="success-btn" onclick="generateTeams()">Genera Squadre</button>
        </div>
     <div id="teams-result" class="hidden">
    <div class="team-box" id="team-a-container"></div>
    <div class="team-box" id="team-b-container"></div>

    <div class="card result-card">
        <h3>VERDETTO FINALE</h3>
        <select id="mvp-select"></select>
        <div class="win-actions">
            <button onclick="saveMatch('A')" class="btn-win-a">VINCE SQUADRA A</button>
            <button onclick="saveMatch('B')" class="btn-win-b">VINCE SQUADRA B</button>
        </div>
    </div>
</div>
    </section>

    <section id="admin-section" class="hidden">
        <div class="card">
            <h2>Nuovo Giocatore</h2>
            <input type="text" id="player-name" placeholder="Nome">
            <div class="stats-inputs">
                <div class="stat-col"><label>Corsa</label><input type="number" id="stat-run"></div>
                <div class="stat-col"><label>Piedi</label><input type="number" id="stat-foot"></div>
                <div class="stat-col"><label>Vers.</label><input type="number" id="stat-vers"></div>
            </div>
            <button class="success-btn" onclick="addPlayer()">Aggiungi</button>
        </div>
        <button class="primary-btn" onclick="forceCloudSync()">💾 SALVA STATO SU CLOUD</button>
        <ul id="master-player-list"></ul>
    </section>

    <section id="history-section" class="hidden">
        <div id="history-list"></div>
    </section>
</div>
<script src="app.js"></script>
</body>
</html>
